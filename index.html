<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>The World-Observing Datalake</title>
<style>
  :root {
    --bg-0:#050505; --bg-1:#0a0a0a; --bg-2:#111; --bg-3:#161616;
    --fg:#f5f2e8; --muted:#b9b3a2; --faint:#807a6d;
    --accent:#ffd84d; --accent-dim:rgba(255,216,77,.14);
    --border:rgba(255,255,255,.09);
    --mono:'JetBrains Mono',ui-monospace,'SF Mono',Menlo,Consolas,monospace;
    --sans:'Inter',system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;
    --tier1:#7ee0c0; --tier2:#ffd84d; --tier3:#9db8ff;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html { scroll-behavior:smooth; }
  body {
    font-family:var(--sans); background:var(--bg-0); color:var(--fg);
    font-size:15px; line-height:1.65; min-height:100vh; overflow-x:hidden;
  }
  body::before {
    content:''; position:fixed; inset:0; z-index:-1; opacity:.18;
    background:
      linear-gradient(rgba(255,255,255,.025) 1px,transparent 1px),
      linear-gradient(90deg,rgba(255,255,255,.025) 1px,transparent 1px);
    background-size:34px 34px;
  }
  a { color:var(--accent); text-decoration:none; }
  code { font-family:var(--mono); font-size:.88em; color:var(--accent); }
  ::-webkit-scrollbar { width:8px; height:8px; }
  ::-webkit-scrollbar-thumb { background:rgba(255,216,77,.18); border-radius:4px; }
  ::-webkit-scrollbar-thumb:hover { background:rgba(255,216,77,.35); }

  /* ---- Layout ---- */
  .topbar {
    position:sticky; top:0; z-index:50; display:flex; align-items:center;
    gap:16px; padding:12px 22px; background:rgba(5,5,5,.92);
    backdrop-filter:blur(10px); border-bottom:1px solid var(--border);
  }
  .brand { font-family:var(--mono); font-weight:700; font-size:14px; letter-spacing:.02em; color:var(--accent); white-space:nowrap; }
  .brand .dot { color:var(--fg); }
  .crumb { font-size:12px; color:var(--faint); font-family:var(--mono); flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .crumb a { color:var(--muted); }
  .crumb .sep { color:var(--faint); margin:0 6px; }
  .tech-toggle {
    font-family:var(--mono); font-size:11px; text-transform:uppercase; letter-spacing:.05em;
    border:1px solid var(--border); background:none; color:var(--muted);
    padding:6px 12px; border-radius:4px; cursor:pointer; white-space:nowrap; transition:all .15s;
  }
  .tech-toggle:hover { color:var(--accent); border-color:rgba(255,216,77,.35); }
  .tech-toggle.on { color:var(--bg-0); background:var(--accent); border-color:var(--accent); font-weight:700; }

  .layout { display:flex; max-width:1400px; margin:0 auto; }
  .nav {
    width:268px; flex-shrink:0; padding:24px 12px 60px; position:sticky; top:53px;
    height:calc(100vh - 53px); overflow-y:auto; border-right:1px solid var(--border);
  }
  .nav-group { margin-bottom:6px; }
  .nav-item {
    display:flex; align-items:center; gap:8px; padding:7px 12px; border-radius:6px;
    cursor:pointer; color:var(--muted); font-size:13.5px; transition:all .12s; user-select:none;
  }
  .nav-item:hover { background:var(--bg-2); color:var(--fg); }
  .nav-item.active { background:var(--accent-dim); color:var(--accent); font-weight:600; }
  .nav-item .ico { font-size:14px; width:18px; text-align:center; flex-shrink:0; }
  .nav-item.lvl1 { padding-left:34px; font-size:12.5px; color:var(--faint); }
  .nav-item.lvl1:hover { color:var(--fg); }
  .nav-item.lvl1.active { color:var(--accent); background:transparent; }
  .nav-caret { margin-left:auto; font-size:10px; color:var(--faint); transition:transform .15s; }
  .nav-group.open .nav-caret { transform:rotate(90deg); }
  .nav-children { display:none; }
  .nav-group.open .nav-children { display:block; }

  .main { flex:1; min-width:0; padding:34px 44px 120px; }
  @media (max-width:880px){
    .layout{flex-direction:column;}
    .nav{width:100%;height:auto;position:static;border-right:none;border-bottom:1px solid var(--border);}
    .main{padding:24px 18px 80px;}
  }

  /* ---- Content blocks ---- */
  .eyebrow { font-family:var(--mono); font-size:11px; text-transform:uppercase; letter-spacing:.16em; color:var(--accent); margin-bottom:14px; }
  h1.page { font-size:34px; font-weight:800; line-height:1.15; letter-spacing:-.01em; margin-bottom:14px; }
  h2.page { font-size:24px; font-weight:700; margin:38px 0 14px; letter-spacing:-.01em; }
  h3 { font-size:16px; font-weight:700; margin:24px 0 8px; }
  p.lede { font-size:18px; color:var(--muted); line-height:1.6; max-width:760px; margin-bottom:8px; }
  p { max-width:780px; color:var(--muted); margin-bottom:12px; }
  p strong, li strong { color:var(--fg); font-weight:600; }
  ul.clean { list-style:none; max-width:780px; margin:8px 0 16px; }
  ul.clean li { padding:7px 0 7px 24px; position:relative; color:var(--muted); border-bottom:1px solid var(--border); }
  ul.clean li:before { content:'▸'; position:absolute; left:2px; color:var(--accent); }

  .hero { padding:30px 0 10px; }
  .hero h1 { font-size:46px; font-weight:900; line-height:1.08; letter-spacing:-.02em; max-width:880px; margin-bottom:20px; }
  .hero h1 .hl { color:var(--accent); }
  .hero .lede { font-size:20px; max-width:720px; }

  .statbar { display:flex; flex-wrap:wrap; gap:14px; margin:30px 0; }
  .stat { border:1px solid var(--border); border-radius:10px; padding:16px 20px; background:var(--bg-1); min-width:120px; }
  .stat .n { font-family:var(--mono); font-size:28px; font-weight:700; color:var(--accent); line-height:1; }
  .stat .l { font-size:11px; text-transform:uppercase; letter-spacing:.08em; color:var(--faint); margin-top:8px; }

  /* tiles */
  .tiles { display:grid; grid-template-columns:repeat(auto-fill,minmax(248px,1fr)); gap:16px; margin:26px 0; }
  .tile {
    border:1px solid var(--border); border-radius:12px; padding:22px; background:var(--bg-1);
    cursor:pointer; transition:all .16s; position:relative; overflow:hidden;
  }
  .tile:hover { border-color:rgba(255,216,77,.4); transform:translateY(-2px); background:var(--bg-2); }
  .tile .ico { font-size:26px; margin-bottom:12px; }
  .tile h3 { margin:0 0 6px; font-size:17px; }
  .tile p { font-size:13.5px; margin:0; max-width:none; line-height:1.5; }
  .tile .go { font-family:var(--mono); font-size:11px; color:var(--accent); margin-top:14px; text-transform:uppercase; letter-spacing:.06em; }

  /* component cards */
  .cards { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:14px; margin:20px 0; }
  .card {
    border:1px solid var(--border); border-radius:11px; padding:18px 20px; background:var(--bg-1);
    cursor:pointer; transition:all .15s;
  }
  .card:hover { border-color:rgba(255,216,77,.35); background:var(--bg-2); }
  .card .top { display:flex; align-items:center; gap:10px; margin-bottom:8px; }
  .card .ico { font-size:20px; }
  .card .name { font-weight:700; font-size:15px; }
  .card p { font-size:13px; margin:0; max-width:none; }
  .card .tagrow { margin-top:12px; display:flex; gap:6px; flex-wrap:wrap; }
  .tag { font-family:var(--mono); font-size:10px; padding:3px 7px; border-radius:4px; background:var(--bg-3); color:var(--muted); border:1px solid var(--border); }
  .tag.planned { color:var(--faint); border-style:dashed; }
  .card.planned { border-style:dashed; cursor:pointer; }
  .card.planned:hover { border-color:rgba(255,216,77,.28); }
  .card.planned .name::after { content:' · planned'; font-family:var(--mono); font-size:10px; font-weight:500; color:var(--faint); margin-left:4px; }

  .callout {
    border-left:3px solid var(--accent); background:var(--accent-dim); border-radius:0 8px 8px 0;
    padding:14px 18px; margin:20px 0; max-width:800px;
  }
  .callout .k { font-family:var(--mono); font-size:11px; text-transform:uppercase; letter-spacing:.08em; color:var(--accent); margin-bottom:4px; }
  .callout p { color:var(--fg); margin:0; }

  /* technical detail (hidden by default for exec view) */
  .tech { display:none; }
  body.show-tech .tech { display:block; }
  .tech-inline { display:none; }
  body.show-tech .tech-inline { display:inline; }
  .techbox {
    border:1px dashed rgba(157,184,255,.3); border-radius:8px; padding:14px 18px; margin:16px 0;
    background:rgba(157,184,255,.04); max-width:820px;
  }
  .techbox .k { font-family:var(--mono); font-size:10px; text-transform:uppercase; letter-spacing:.1em; color:var(--tier3); margin-bottom:8px; }
  .techbox code { color:var(--tier3); }
  table.api { width:100%; max-width:820px; border-collapse:collapse; font-family:var(--mono); font-size:12px; margin:8px 0; }
  table.api td { padding:6px 10px; border-bottom:1px solid var(--border); color:var(--muted); vertical-align:top; }
  table.api td:first-child { color:var(--accent); white-space:nowrap; }

  /* ---- tier diagram ---- */
  .flow { margin:30px 0; overflow-x:auto; padding-bottom:8px; }
  .flow-inner { display:flex; align-items:stretch; gap:0; min-width:760px; }
  .flow-col { flex:1; min-width:150px; display:flex; flex-direction:column; }
  .flow-arrow { display:flex; align-items:center; color:var(--faint); font-size:24px; padding:0 6px; }
  .tierbox { border:1px solid var(--border); border-radius:12px; padding:18px; background:var(--bg-1); flex:1; transition:all .15s; cursor:pointer; }
  .tierbox:hover { background:var(--bg-2); }
  .tierbox .num { font-family:var(--mono); font-size:11px; font-weight:700; padding:2px 8px; border-radius:20px; display:inline-block; margin-bottom:10px; }
  .tierbox .num.t1 { background:rgba(126,224,192,.15); color:var(--tier1); }
  .tierbox .num.t2 { background:rgba(255,216,77,.15); color:var(--tier2); }
  .tierbox .num.t3 { background:rgba(157,184,255,.15); color:var(--tier3); }
  .tierbox h4 { font-size:15px; margin-bottom:6px; }
  .tierbox p { font-size:12.5px; margin:0; max-width:none; line-height:1.5; }
  .flow-end { display:flex; flex-direction:column; justify-content:center; padding-left:6px; min-width:120px; }
  .flow-end .agent { border:1px solid rgba(255,216,77,.35); border-radius:12px; padding:16px; text-align:center; background:var(--accent-dim); }
  .flow-end .agent .ico { font-size:26px; }
  .flow-end .agent .l { font-size:12px; color:var(--fg); margin-top:6px; font-weight:600; }
  .flow-src { display:flex; flex-direction:column; justify-content:center; min-width:118px; }
  .flow-src .src { border:1px dashed var(--border); border-radius:10px; padding:14px; text-align:center; }
  .flow-src .src .ico { font-size:24px; }
  .flow-src .src .l { font-size:11px; color:var(--muted); margin-top:6px; }

  .coverage { display:inline-block; font-family:var(--mono); font-size:12.5px; color:var(--tier1); border:1px solid rgba(126,224,192,.3); background:rgba(126,224,192,.06); padding:6px 12px; border-radius:7px; margin:2px 0 6px; }
  .coverage strong { color:var(--fg); font-weight:600; }
  .example { margin-top:14px; }
  .example .lbl { font-family:var(--mono); font-size:10px; text-transform:uppercase; letter-spacing:.12em; color:var(--faint); margin-bottom:6px; }
  pre.code { background:var(--bg-0); border:1px solid var(--border); border-radius:7px; padding:12px 14px; overflow-x:auto; font-family:var(--mono); font-size:12px; color:var(--tier3); line-height:1.55; white-space:pre; }
  .backlink { font-family:var(--mono); font-size:12px; color:var(--muted); cursor:pointer; display:inline-flex; gap:6px; align-items:center; margin-bottom:18px; }
  .backlink:hover { color:var(--accent); }
  .divider { height:1px; background:var(--border); margin:34px 0; max-width:820px; }
  .phase { display:flex; gap:18px; margin:0 0 4px; max-width:820px; }
  .phase .rail { display:flex; flex-direction:column; align-items:center; }
  .phase .pin { width:30px; height:30px; border-radius:50%; background:var(--bg-2); border:1px solid var(--accent); color:var(--accent); font-family:var(--mono); font-weight:700; display:flex; align-items:center; justify-content:center; font-size:13px; flex-shrink:0; }
  .phase .line { width:1px; flex:1; background:var(--border); margin:4px 0; }
  .phase .body { padding-bottom:22px; }
  .phase .body h3 { margin:2px 0 4px; }
  .phase .body p { font-size:14px; margin:0; }
  .footnote { font-size:12px; color:var(--faint); font-family:var(--mono); margin-top:50px; padding-top:18px; border-top:1px solid var(--border); max-width:820px; }
  .hidden { display:none !important; }
</style>
</head>
<body>
  <div class="topbar">
    <div class="brand">world&#8209;observer<span class="dot">.</span>dl</div>
    <div class="crumb" id="crumb"></div>
    <button class="tech-toggle" id="techBtn">+ Technical detail</button>
  </div>

  <div class="layout">
    <nav class="nav" id="nav"></nav>
    <main class="main" id="main"></main>
  </div>

<script>
/* ============================================================
   SANITIZED CONTENT MODEL — internal proper nouns genericized.
   No company name, real S3 bucket, or internal dataset names.
   ============================================================ */

const PAGES = {};

/* ---------- L0  HOME ---------- */
PAGES.home = { title:"Overview", nav:"Overview", ico:"◎", render: () => `
  <div class="hero">
    <div class="eyebrow">A proposal · world-observing data platform v1.5</div>
    <h1>A datalake that <span class="hl">watches the world</span>, remembers it in tiers, and lets AI agents explore it on demand.</h1>
    <p class="lede">Autonomous "watchers" continuously pull real-world signals — shipping, filings, economics, news, disasters, markets — into a single store. AI agents then query across everything to answer questions no single feed could.</p>
  </div>

  <div class="statbar">
    <div class="stat"><div class="n">10+</div><div class="l">Live services</div></div>
    <div class="stat"><div class="n">15</div><div class="l">Watcher services</div></div>
    <div class="stat"><div class="n">3</div><div class="l">Storage tiers</div></div>
    <div class="stat"><div class="n">7</div><div class="l">Research archetypes</div></div>
    <div class="stat"><div class="n">24/7</div><div class="l">Autonomous collection</div></div>
  </div>

  <div class="callout">
    <div class="k">The one-sentence pitch</div>
    <p>Instead of an analyst opening ten dashboards, one AI agent reads the whole world — already collected, already joined — and reports back.</p>
  </div>

  <h2 class="page">Start here</h2>
  <p>Pick a thread. Each opens to a plain-language overview; turn on <strong>Technical detail</strong> (top-right) any time you want the engineering underneath.</p>
  <div class="tiles">
    ${tile('concept','◍','How it works','Signals flow through three storage tiers — instant alerts, a live store, and a deep archive.','See the data flow')}
    ${tile('observers','🛰','What it watches','Independent watchers grouped by domain — economics, hazards, maritime, news, markets and filings.','Meet the watchers')}
    ${tile('intelligence','🧠','How AI uses it','An intelligence hub and agents that read across every layer at once.','See the brain')}
    ${tile('research','🔬','Autonomous research','LLM researchers invent and test trading-signal ideas against the lake; a meta-layer keeps only what survives.','See the lab')}
    ${tile('infrastructure','⚙','What runs it','The cloud plumbing: scheduling, object storage, messaging, distributed query, code hosting.','Look under the hood')}
    ${tile('proposal','◆','Build one like it','Why it is worth doing, and a phased plan to stand one up.','Read the proposal')}
  </div>
`};

/* ---------- L1  CONCEPT (tiers) ---------- */
PAGES.concept = { title:"How it works", nav:"How it works", ico:"◍", parent:"home", render: () => `
  ${back('home')}
  <div class="eyebrow">The data system</div>
  <h1 class="page">Three tiers, one flow</h1>
  <p class="lede">Data has different jobs at different ages. Fresh signals need to fire alerts <em>now</em>; recent data needs to be queried <em>fast</em>; everything else needs to be kept <em>cheaply, forever</em>. The system splits storage to match.</p>

  <div class="flow">
    <div class="flow-inner">
      <div class="flow-src"><div class="src"><div class="ico">🌍</div><div class="l">World signals</div></div></div>
      <div class="flow-arrow">→</div>
      <div class="flow-col"><div class="tierbox" onclick="go('tier-event')"><span class="num t1">TIER 1</span><h4>Event signaling</h4><p>"Something new arrived." A lightweight nudge that wakes up whoever cares.</p></div></div>
      <div class="flow-arrow">→</div>
      <div class="flow-col"><div class="tierbox" onclick="go('tier-hot')"><span class="num t2">TIER 2</span><h4>Hot store</h4><p>The last days–weeks, query-ready in milliseconds for live questions.</p></div></div>
      <div class="flow-arrow">→</div>
      <div class="flow-col"><div class="tierbox" onclick="go('tier-cold')"><span class="num t3">TIER 3</span><h4>Cold storage</h4><p>The full history, compressed and cheap, for deep analysis.</p></div></div>
      <div class="flow-arrow">→</div>
      <div class="flow-end"><div class="agent"><div class="ico">🧠</div><div class="l">AI agents query all three</div></div></div>
    </div>
  </div>

  <div class="callout">
    <div class="k">Why it matters</div>
    <p>Most systems pick one tier and pay for it elsewhere — either they are fast but forgetful, or complete but slow. Tiering gets both: instant reaction <em>and</em> total recall.</p>
  </div>

  <h2 class="page">The three tiers</h2>
  <div class="cards">
    ${card('tier-event','⚡','Tier 1 · Event signaling','A tiny message says "new data landed" so downstream work starts within seconds — nobody polls and waits.')}
    ${card('tier-hot','🔥','Tier 2 · Hot store','Recent data kept beside each watcher and served over a simple API for live, low-latency questions.')}
    ${card('tier-cold','🧊','Tier 3 · Cold storage','Columnar files in cheap object storage, with a catalog so the whole archive is one queryable table.')}
  </div>
`};

PAGES['tier-event'] = { title:"Tier 1 · Event signaling", nav:"Event signaling", ico:"⚡", parent:"concept", render: () => `
  ${back('concept')}
  <div class="eyebrow">Tier 1 · the nudge</div>
  <h1 class="page">⚡ Event signaling</h1>
  <p class="lede">When a watcher collects something new, it announces it. Anyone interested reacts immediately — no constant checking, no wasted compute.</p>
  <ul class="clean">
    <li><strong>What it carries:</strong> a small note — "this source updated" — not the data itself.</li>
    <li><strong>What it unlocks:</strong> near-real-time reactions and clean coordination between services.</li>
    <li><strong>Bonus job:</strong> it also acts as a traffic cop, making sure two writers never clash over the same file.</li>
  </ul>
  <div class="techbox tech">
    <div class="k">Technical detail</div>
    <p>Implemented as <code>turbomsg</code> — an S3-backed message layer (no broker to run). Topics follow <code>data.&lt;watcher&gt;.&lt;event&gt;</code>, e.g. <code>data.fred-watch.observations-updated</code>, <code>data.firms-watch.fires-updated</code>, <code>data.edgar-watch.filings-polled</code>. The same layer provides write-lock coordination for the cold-storage catalog.</p>
  </div>
`};

PAGES['tier-hot'] = { title:"Tier 2 · Hot store", nav:"Hot store", ico:"🔥", parent:"concept", render: () => `
  ${back('concept')}
  <div class="eyebrow">Tier 2 · the live desk</div>
  <h1 class="page">🔥 Hot store</h1>
  <p class="lede">Each watcher keeps its recent data right next to itself and serves it over a simple web API. Ask "what happened in the last 24 hours?" and the answer comes back instantly.</p>
  <ul class="clean">
    <li><strong>Optimized for:</strong> speed and freshness over depth.</li>
    <li><strong>Shape:</strong> small embedded databases, one per watcher — no shared bottleneck.</li>
    <li><strong>Access:</strong> plain HTTP endpoints any tool or agent can call.</li>
  </ul>
  <div class="techbox tech">
    <div class="k">Technical detail</div>
    <p>Per-service embedded <code>SQLite</code> / <code>DuckDB</code> with full-text search (FTS5) where useful. Each watcher exposes a Hono HTTP API on its own port. Hot stores are continuously replicated to cold storage so nothing is lost on restart.</p>
  </div>
`};

PAGES['tier-cold'] = { title:"Tier 3 · Cold storage", nav:"Cold storage", ico:"🧊", parent:"concept", render: () => `
  ${back('concept')}
  <div class="eyebrow">Tier 3 · the deep archive</div>
  <h1 class="page">🧊 Cold storage</h1>
  <p class="lede">Everything ever collected, written to cheap cloud object storage in a compact analytical format — and wrapped in a catalog so the entire archive behaves like one giant table you can query.</p>
  <ul class="clean">
    <li><strong>Optimized for:</strong> cost and completeness over latency.</li>
    <li><strong>Why a catalog:</strong> it turns millions of files into a single queryable surface, with versioning and time-travel.</li>
    <li><strong>Who reads it:</strong> analysts and AI agents running historical, cross-source analysis.</li>
  </ul>
  <div class="techbox tech">
    <div class="k">Technical detail</div>
    <p>Object store: a single S3 bucket (<code>firm-datalake</code>) holding Parquet. Catalog: <code>DuckLake</code> (DuckDB-native lakehouse) for ACID, versioning and time-travel over the Parquet. A periodic compaction job merges small files; indexers (prediction markets, on-chain data) write directly into the catalog.</p>
    <div class="example"><div class="lbl">Example — the entire archive as one queryable table</div><pre class="code">ATTACH 'ducklake:s3://firm-datalake/catalog.ducklake' AS lake (READ_ONLY);\nSELECT count(*) FROM lake.polymarket_trades;   -- 405,012,316 rows</pre></div>
  </div>
`};

/* ---------- L1  OBSERVERS ---------- */
const WATCHER_GROUPS = [
  { title:'Economics & central banks', lede:'One watcher per institution or API — rates, inflation, GDP and release calendars from the Fed, ECB, BOJ, IMF and World Bank (replacing the old combined macro-watch service).', ids:['fred-watch','ecb-watch','boj-watch','imf-watch','worldbank-watch'] },
  { title:'Hazards & climate', lede:'Physical-world stress kept separate from economic series — official disaster alerts and satellite fire/heat detections.', ids:['disaster-watch','firms-watch'] },

/* ---------- helpers ---------- */
function tile(id,ico,h,p,go){ return `<div class="tile" onclick="go('${id}')"><div class="ico">${ico}</div><h3>${h}</h3><p>${p}</p><div class="go">${go} →</div></div>`; }
function card(id,ico,name,p,tags){ return `<div class="card" onclick="go('${id}')"><div class="top"><span class="ico">${ico}</span><span class="name">${name}</span></div><p>${p}</p>${tags?`<div class="tagrow">${tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>`:''}</div>`; }
function plannedCard(id,ico,name,p,tags){ return `<div class="card planned" onclick="go('${id}')"><div class="top"><span class="ico">${ico}</span><span class="name">${name}</span></div><p>${p}</p>${tags?`<div class="tagrow">${tags.map(t=>`<span class="tag planned">${t}</span>`).join('')}</div>`:''}</div>`; }
function back(id){ return `<div class="backlink" onclick="go('${id}')">← ${PAGES[id].title}</div>`; }
function phase(n,h,p,last){ return `<div class="phase"><div class="rail"><div class="pin">${n}</div>${last?'':'<div class="line"></div>'}</div><div class="body"><h3>${h}</h3><p>${p}</p></div></div>`; }

/* ---------- nav tree ---------- */
const TREE = [
  ['home',[]],
  ['concept',['tier-event','tier-hot','tier-cold']],
  ['observers', [...ALL_WATCHER_IDS, ...ALL_POTENTIAL_IDS]],
  ['intelligence',['hub','agent','sentinel','oraclebot']],
  ['research', RESEARCH.map(r=>r[0])],
  ['infrastructure',Object.keys(INFRA)],
  ['proposal',[]],
];

function buildNav(){
  const nav = document.getElementById('nav');
  nav.innerHTML = TREE.map(([pid,kids])=>{
    const p = PAGES[pid];
    const children = kids.map(k=>`<div class="nav-item lvl1" data-id="${k}" onclick="go('${k}')"><span>${PAGES[k].nav}</span></div>`).join('');
    const caret = kids.length?`<span class="nav-caret">▶</span>`:'';
    return `<div class="nav-group" data-group="${pid}">
      <div class="nav-item" data-id="${pid}" onclick="navClick(event,'${pid}',${kids.length})"><span class="ico">${p.ico}</span><span>${p.nav}</span>${caret}</div>
      <div class="nav-children">${children}</div>
    </div>`;
  }).join('');
}

function navClick(e,id,hasKids){ go(id); }

function go(id){ location.hash = '#/'+id; }

function render(id){
  const p = PAGES[id] || PAGES.home;
  document.getElementById('main').innerHTML = p.render();
  document.getElementById('main').scrollTop = 0;
  window.scrollTo(0,0);
  // breadcrumb
  const chain=[]; let cur=id;
  while(cur){ chain.unshift(cur); cur = PAGES[cur] && PAGES[cur].parent; }
  document.getElementById('crumb').innerHTML = chain.map((c,i)=>
    i===chain.length-1 ? `<span>${PAGES[c].title}</span>` : `<a onclick="go('${c}')">${PAGES[c].title}</a><span class="sep">/</span>`
  ).join('');
  // nav active state + open the right group
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.toggle('active', n.dataset.id===id));
  document.querySelectorAll('.nav-group').forEach(g=>{
    const gid=g.dataset.group;
    const open = gid===id || (PAGES[id] && PAGES[id].parent===gid) || (PAGES[id] && PAGES[PAGES[id].parent] && PAGES[PAGES[id].parent].parent===gid);
    g.classList.toggle('open', !!open);
  });
}

function route(){ const id=(location.hash||'#/home').replace('#/',''); render(id); }

document.getElementById('techBtn').addEventListener('click', e=>{
  document.body.classList.toggle('show-tech');
  const on = document.body.classList.contains('show-tech');
  e.target.classList.toggle('on', on);
  e.target.textContent = on ? '✓ Technical detail' : '+ Technical detail';
});

buildNav();
window.addEventListener('hashchange', route);
route();
</script>
